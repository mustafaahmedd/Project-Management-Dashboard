<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="s7">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#475569"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#34D399"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#6C63FF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" rx="16" fill="#0B0D11"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#F1F5F9" font-size="22" font-weight="800" font-family="Plus Jakarta Sans, Inter, sans-serif">Activity Diagrams</text>
  <text x="600" y="58" text-anchor="middle" fill="#94A3B8" font-size="12">Step-by-step workflows for Task Lifecycle and Time Tracking</text>

  <!-- ===== TASK LIFECYCLE (Left) ===== -->
  <rect x="30" y="76" width="560" height="800" rx="14" fill="#12141A" stroke="#34D399" stroke-width="1" filter="url(#s7)"/>
  <text x="310" y="100" text-anchor="middle" fill="#34D399" font-size="14" font-weight="700">Task Lifecycle — Creation to Completion</text>

  <!-- Start -->
  <circle cx="310" cy="130" r="12" fill="#6C63FF"/>
  <text x="310" y="134" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">S</text>

  <!-- Create Task -->
  <line x1="310" y1="142" x2="310" y2="160" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="230" y="160" width="160" height="30" rx="8" fill="#181B22" stroke="#94A3B8"/>
  <text x="310" y="179" text-anchor="middle" fill="#F1F5F9" font-size="10">Create New Task</text>

  <!-- Fill Details -->
  <line x1="310" y1="190" x2="310" y2="205" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="210" y="205" width="200" height="30" rx="8" fill="#181B22" stroke="#94A3B8"/>
  <text x="310" y="224" text-anchor="middle" fill="#F1F5F9" font-size="10">Fill Title, Priority, Deadline</text>

  <!-- Decision: Assign Project? -->
  <line x1="310" y1="235" x2="310" y2="255" stroke="#475569" marker-end="url(#arr)"/>
  <polygon points="310,255 360,280 310,305 260,280" fill="#181B22" stroke="#FBBF24" stroke-width="1"/>
  <text x="310" y="283" text-anchor="middle" fill="#FBBF24" font-size="9">Project?</text>

  <!-- Yes: Select Project -->
  <line x1="360" y1="280" x2="430" y2="280" stroke="#34D399" marker-end="url(#arrG)"/>
  <text x="390" y="274" fill="#34D399" font-size="8">Yes</text>
  <rect x="430" y="265" width="130" height="28" rx="7" fill="#181B22" stroke="#34D399"/>
  <text x="495" y="283" text-anchor="middle" fill="#34D399" font-size="9">Select Project</text>

  <!-- No: Backlog -->
  <line x1="260" y1="280" x2="180" y2="280" stroke="#F87171"/>
  <text x="225" y="274" fill="#F87171" font-size="8">No</text>
  <rect x="60" y="265" width="120" height="28" rx="7" fill="#181B22" stroke="#94A3B8"/>
  <text x="120" y="283" text-anchor="middle" fill="#94A3B8" font-size="9">Personal Backlog</text>

  <!-- Both merge → Set Estimate -->
  <line x1="120" y1="293" x2="120" y2="328" stroke="#475569"/>
  <line x1="495" y1="293" x2="495" y2="315" stroke="#475569"/>
  <line x1="120" y1="328" x2="310" y2="328" stroke="#475569"/>
  <line x1="495" y1="315" x2="310" y2="328" stroke="#475569"/>
  <line x1="310" y1="328" x2="310" y2="338" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="220" y="338" width="180" height="28" rx="7" fill="#181B22" stroke="#94A3B8"/>
  <text x="310" y="356" text-anchor="middle" fill="#F1F5F9" font-size="10">Set Time Estimate</text>

  <!-- Decision: Add Subtasks? -->
  <line x1="310" y1="366" x2="310" y2="385" stroke="#475569" marker-end="url(#arr)"/>
  <polygon points="310,385 355,407 310,429 265,407" fill="#181B22" stroke="#FBBF24" stroke-width="1"/>
  <text x="310" y="410" text-anchor="middle" fill="#FBBF24" font-size="9">Subtasks?</text>

  <line x1="355" y1="407" x2="430" y2="407" stroke="#34D399"/>
  <text x="388" y="401" fill="#34D399" font-size="8">Yes</text>
  <rect x="430" y="393" width="130" height="28" rx="7" fill="#181B22" stroke="#34D399"/>
  <text x="495" y="411" text-anchor="middle" fill="#34D399" font-size="9">Create Checklist</text>

  <!-- Task Ready (To Do) -->
  <line x1="265" y1="407" x2="200" y2="407" stroke="#475569"/>
  <text x="235" y="401" fill="#94A3B8" font-size="8">No</text>
  <line x1="200" y1="407" x2="200" y2="450" stroke="#475569"/>
  <line x1="495" y1="421" x2="495" y2="450" stroke="#475569"/>
  <line x1="200" y1="450" x2="310" y2="450" stroke="#475569"/>
  <line x1="495" y1="450" x2="310" y2="450" stroke="#475569"/>
  <line x1="310" y1="450" x2="310" y2="460" stroke="#475569" marker-end="url(#arr)"/>

  <rect x="215" y="460" width="190" height="32" rx="8" fill="#60A5FA15" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="310" y="480" text-anchor="middle" fill="#60A5FA" font-size="11" font-weight="600">Status: To Do</text>

  <!-- Start Work → In Progress -->
  <line x1="310" y1="492" x2="310" y2="510" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="230" y="510" width="160" height="28" rx="7" fill="#181B22" stroke="#6C63FF"/>
  <text x="310" y="528" text-anchor="middle" fill="#6C63FF" font-size="10">Move to In Progress</text>

  <!-- Start Timer -->
  <line x1="310" y1="538" x2="310" y2="555" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="240" y="555" width="140" height="28" rx="7" fill="#181B22" stroke="#60A5FA"/>
  <text x="310" y="573" text-anchor="middle" fill="#60A5FA" font-size="10">Start Timer</text>

  <!-- Work Loop -->
  <line x1="310" y1="583" x2="310" y2="600" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="245" y="600" width="130" height="28" rx="7" fill="#181B22" stroke="#94A3B8"/>
  <text x="310" y="618" text-anchor="middle" fill="#F1F5F9" font-size="10">Work on Task</text>

  <!-- Decision: All subtasks done? -->
  <line x1="310" y1="628" x2="310" y2="648" stroke="#475569" marker-end="url(#arr)"/>
  <polygon points="310,648 365,672 310,696 255,672" fill="#181B22" stroke="#FBBF24" stroke-width="1"/>
  <text x="310" y="675" text-anchor="middle" fill="#FBBF24" font-size="8">All Done?</text>

  <!-- No: loop back -->
  <line x1="255" y1="672" x2="150" y2="672" stroke="#F87171"/>
  <text x="200" y="666" fill="#F87171" font-size="8">No</text>
  <line x1="150" y1="672" x2="150" y2="614" stroke="#F87171"/>
  <line x1="150" y1="614" x2="243" y2="614" stroke="#F87171" marker-end="url(#arr)"/>

  <!-- Yes: Submit Review -->
  <line x1="365" y1="672" x2="430" y2="672" stroke="#34D399"/>
  <text x="395" y="666" fill="#34D399" font-size="8">Yes</text>
  <rect x="430" y="658" width="120" height="28" rx="7" fill="#181B22" stroke="#34D399"/>
  <text x="490" y="676" text-anchor="middle" fill="#34D399" font-size="9">Stop Timer</text>

  <!-- In Review -->
  <line x1="490" y1="686" x2="490" y2="705" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="415" y="705" width="150" height="28" rx="7" fill="#FBBF2415" stroke="#FBBF24"/>
  <text x="490" y="723" text-anchor="middle" fill="#FBBF24" font-size="10">Move to In Review</text>

  <!-- Review Decision -->
  <line x1="490" y1="733" x2="490" y2="750" stroke="#475569" marker-end="url(#arr)"/>
  <polygon points="490,750 535,772 490,794 445,772" fill="#181B22" stroke="#FBBF24" stroke-width="1"/>
  <text x="490" y="775" text-anchor="middle" fill="#FBBF24" font-size="8">Passed?</text>

  <!-- No: Rework -->
  <line x1="445" y1="772" x2="310" y2="772" stroke="#F87171"/>
  <text x="375" y="766" fill="#F87171" font-size="8">No</text>
  <line x1="310" y1="772" x2="310" y2="583" stroke="#F87171" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="298" y="700" fill="#F87171" font-size="8" transform="rotate(-90 298 700)">Rework</text>

  <!-- Yes: Done -->
  <line x1="535" y1="772" x2="560" y2="772" stroke="#34D399"/>
  <text x="545" y="766" fill="#34D399" font-size="8">Yes</text>

  <!-- Done -->
  <rect x="415" y="810" width="150" height="32" rx="8" fill="#34D39915" stroke="#34D399" stroke-width="1.5"/>
  <text x="490" y="830" text-anchor="middle" fill="#34D399" font-size="11" font-weight="700">Done ✓</text>
  <line x1="535" y1="780" x2="535" y2="810" stroke="#34D399" marker-end="url(#arrG)"/>

  <!-- End -->
  <circle cx="490" cy="860" r="10" fill="#34D399" stroke="#0B0D11" stroke-width="3"/>
  <circle cx="490" cy="860" r="14" fill="none" stroke="#34D399"/>
  <line x1="490" y1="842" x2="490" y2="850" stroke="#34D399"/>

  <!-- ===== TIME TRACKING WORKFLOW (Right) ===== -->
  <rect x="620" y="76" width="550" height="800" rx="14" fill="#12141A" stroke="#60A5FA" stroke-width="1" filter="url(#s7)"/>
  <text x="895" y="100" text-anchor="middle" fill="#60A5FA" font-size="14" font-weight="700">Time Tracking Session Workflow</text>

  <!-- Start -->
  <circle cx="895" cy="130" r="12" fill="#6C63FF"/>
  <text x="895" y="134" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">S</text>

  <!-- Select Task -->
  <line x1="895" y1="142" x2="895" y2="163" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="805" y="163" width="180" height="30" rx="8" fill="#181B22" stroke="#94A3B8"/>
  <text x="895" y="182" text-anchor="middle" fill="#F1F5F9" font-size="10">Select Task to Track</text>

  <!-- Has Estimate? -->
  <line x1="895" y1="193" x2="895" y2="215" stroke="#475569" marker-end="url(#arr)"/>
  <polygon points="895,215 945,238 895,261 845,238" fill="#181B22" stroke="#FBBF24" stroke-width="1"/>
  <text x="895" y="241" text-anchor="middle" fill="#FBBF24" font-size="9">Estimate?</text>

  <!-- No -->
  <line x1="845" y1="238" x2="740" y2="238" stroke="#F87171"/>
  <text x="795" y="232" fill="#F87171" font-size="8">No</text>
  <rect x="650" y="225" width="90" height="26" rx="7" fill="#181B22" stroke="#94A3B8"/>
  <text x="695" y="242" text-anchor="middle" fill="#94A3B8" font-size="9">Set Estimate</text>
  <line x1="695" y1="251" x2="695" y2="290" stroke="#475569"/>
  <line x1="695" y1="290" x2="895" y2="290" stroke="#475569"/>

  <!-- Yes -->
  <line x1="895" y1="261" x2="895" y2="290" stroke="#34D399"/>
  <text x="905" y="278" fill="#34D399" font-size="8">Yes</text>

  <!-- Start Timer -->
  <line x1="895" y1="290" x2="895" y2="305" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="815" y="305" width="160" height="30" rx="8" fill="#34D39915" stroke="#34D399" stroke-width="1.5"/>
  <text x="895" y="324" text-anchor="middle" fill="#34D399" font-size="11" font-weight="600">Start Timer</text>

  <!-- Timer Running -->
  <line x1="895" y1="335" x2="895" y2="355" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="810" y="355" width="170" height="34" rx="10" fill="#FBBF2415" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="895" y="376" text-anchor="middle" fill="#FBBF24" font-size="12" font-weight="600">Timer Running</text>

  <!-- User Action Decision -->
  <line x1="895" y1="389" x2="895" y2="415" stroke="#475569" marker-end="url(#arr)"/>
  <polygon points="895,415 950,440 895,465 840,440" fill="#181B22" stroke="#FBBF24" stroke-width="1"/>
  <text x="895" y="443" text-anchor="middle" fill="#FBBF24" font-size="9">Action?</text>

  <!-- Pause -->
  <line x1="840" y1="440" x2="720" y2="440" stroke="#FBBF24"/>
  <text x="780" y="434" fill="#FBBF24" font-size="8">Pause</text>
  <rect x="650" y="426" width="70" height="28" rx="7" fill="#181B22" stroke="#FBBF24"/>
  <text x="685" y="444" text-anchor="middle" fill="#FBBF24" font-size="9">Pause</text>

  <!-- Resume loop -->
  <line x1="685" y1="454" x2="685" y2="490" stroke="#475569"/>
  <polygon points="685,490 735,512 685,534 635,512" fill="#181B22" stroke="#FBBF24" stroke-width="1"/>
  <text x="685" y="515" text-anchor="middle" fill="#FBBF24" font-size="8">Resume?</text>
  <line x1="735" y1="512" x2="780" y2="512" stroke="#34D399"/>
  <text x="755" y="506" fill="#34D399" font-size="8">Yes</text>
  <line x1="780" y1="512" x2="780" y2="372" stroke="#34D399"/>
  <line x1="780" y1="372" x2="808" y2="372" stroke="#34D399" marker-end="url(#arrG)"/>

  <!-- Stop -->
  <line x1="950" y1="440" x2="1060" y2="440" stroke="#F87171"/>
  <text x="1000" y="434" fill="#F87171" font-size="8">Stop</text>
  <rect x="1060" y="426" width="80" height="28" rx="7" fill="#181B22" stroke="#F87171"/>
  <text x="1100" y="444" text-anchor="middle" fill="#F87171" font-size="9">Stop Timer</text>

  <!-- Notes Decision -->
  <line x1="1100" y1="454" x2="1100" y2="490" stroke="#475569" marker-end="url(#arr)"/>
  <polygon points="1100,490 1145,512 1100,534 1055,512" fill="#181B22" stroke="#FBBF24" stroke-width="1"/>
  <text x="1100" y="515" text-anchor="middle" fill="#FBBF24" font-size="8">Notes?</text>

  <!-- Yes: Write Notes -->
  <line x1="1055" y1="512" x2="980" y2="512" stroke="#34D399"/>
  <text x="1020" y="506" fill="#34D399" font-size="8">Yes</text>
  <rect x="880" y="498" width="100" height="28" rx="7" fill="#181B22" stroke="#94A3B8"/>
  <text x="930" y="516" text-anchor="middle" fill="#94A3B8" font-size="9">Write Notes</text>

  <!-- Save Entry -->
  <line x1="1100" y1="534" x2="1100" y2="575" stroke="#475569"/>
  <text x="1115" y="555" fill="#94A3B8" font-size="8">No</text>
  <line x1="930" y1="526" x2="930" y2="575" stroke="#475569"/>
  <line x1="930" y1="575" x2="1000" y2="575" stroke="#475569"/>
  <line x1="1100" y1="575" x2="1000" y2="575" stroke="#475569"/>

  <line x1="1000" y1="575" x2="1000" y2="590" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="910" y="590" width="180" height="32" rx="8" fill="#34D39915" stroke="#34D399" stroke-width="1.5"/>
  <text x="1000" y="610" text-anchor="middle" fill="#34D399" font-size="11" font-weight="600">Save Time Entry</text>

  <!-- Update Metrics -->
  <line x1="1000" y1="622" x2="1000" y2="645" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="880" y="645" width="240" height="30" rx="7" fill="#181B22" stroke="#60A5FA"/>
  <text x="1000" y="664" text-anchor="middle" fill="#60A5FA" font-size="10">Update Task Hours &amp; Project Totals</text>

  <!-- Discard path from pause -->
  <line x1="635" y1="512" x2="640" y2="570" stroke="#F87171" stroke-dasharray="3 3"/>
  <text x="620" y="545" fill="#F87171" font-size="8">No</text>
  <rect x="640" y="570" width="75" height="24" rx="6" fill="#181B22" stroke="#F87171"/>
  <text x="677" y="586" text-anchor="middle" fill="#F87171" font-size="9">Discard</text>

  <!-- End -->
  <line x1="1000" y1="675" x2="1000" y2="700" stroke="#34D399"/>
  <circle cx="1000" cy="710" r="10" fill="#34D399" stroke="#0B0D11" stroke-width="3"/>
  <circle cx="1000" cy="710" r="14" fill="none" stroke="#34D399"/>

  <line x1="677" y1="594" x2="677" y2="700" stroke="#F87171" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="677" y1="700" x2="988" y2="710" stroke="#F87171" stroke-dasharray="3 3" opacity="0.3"/>

  <!-- Legend -->
  <rect x="650" y="740" width="490" height="110" rx="10" fill="#181B22" stroke="#2A2D35"/>
  <text x="670" y="762" fill="#F1F5F9" font-size="11" font-weight="700">Legend</text>
  <circle cx="670" cy="782" r="8" fill="#6C63FF"/>
  <text x="685" y="786" fill="#94A3B8" font-size="9">Start node</text>
  <circle cx="760" cy="782" r="6" fill="#34D399" stroke="#0B0D11" stroke-width="2"/>
  <circle cx="760" cy="782" r="10" fill="none" stroke="#34D399"/>
  <text x="778" y="786" fill="#94A3B8" font-size="9">End node</text>
  <rect x="850" y="775" width="50" height="14" rx="6" fill="#181B22" stroke="#94A3B8"/>
  <text x="908" y="786" fill="#94A3B8" font-size="9">Activity</text>
  <polygon points="1010,775 1030,782 1010,789 990,782" fill="#181B22" stroke="#FBBF24"/>
  <text x="1040" y="786" fill="#94A3B8" font-size="9">Decision</text>
  <rect x="670" y="800" width="55" height="14" rx="6" fill="#34D39915" stroke="#34D399" stroke-width="1.5"/>
  <text x="733" y="811" fill="#94A3B8" font-size="9">Key state</text>
  <line x1="820" y1="807" x2="860" y2="807" stroke="#F87171" stroke-dasharray="3 3"/>
  <text x="868" y="811" fill="#94A3B8" font-size="9">Rework / Error path</text>
  <line x1="970" y1="807" x2="1010" y2="807" stroke="#34D399"/>
  <text x="1018" y="811" fill="#94A3B8" font-size="9">Happy path</text>
  <text x="670" y="840" fill="#475569" font-size="9">Green = forward progress | Yellow = decision/pause | Red = rework/discard | Blue = info/update</text>
</svg>
