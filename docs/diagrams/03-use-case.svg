<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" rx="16" fill="#0B0D11"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#F1F5F9" font-size="22" font-weight="800" font-family="Plus Jakarta Sans, Inter, sans-serif">Use Case Diagram</text>
  <text x="600" y="58" text-anchor="middle" fill="#94A3B8" font-size="12">Actors and actions within ProjectPulse</text>

  <!-- ACTORS -->
  <!-- Employee -->
  <g transform="translate(70,180)">
    <circle cx="30" cy="15" r="14" fill="none" stroke="#6C63FF" stroke-width="2"/>
    <line x1="30" y1="29" x2="30" y2="60" stroke="#6C63FF" stroke-width="2"/>
    <line x1="10" y1="42" x2="50" y2="42" stroke="#6C63FF" stroke-width="2"/>
    <line x1="30" y1="60" x2="15" y2="82" stroke="#6C63FF" stroke-width="2"/>
    <line x1="30" y1="60" x2="45" y2="82" stroke="#6C63FF" stroke-width="2"/>
    <text x="30" y="100" text-anchor="middle" fill="#6C63FF" font-size="11" font-weight="700">Employee</text>
    <text x="30" y="114" text-anchor="middle" fill="#475569" font-size="9">(Primary User)</text>
  </g>

  <!-- Manager -->
  <g transform="translate(70,450)">
    <circle cx="30" cy="15" r="14" fill="none" stroke="#FBBF24" stroke-width="2"/>
    <line x1="30" y1="29" x2="30" y2="60" stroke="#FBBF24" stroke-width="2"/>
    <line x1="10" y1="42" x2="50" y2="42" stroke="#FBBF24" stroke-width="2"/>
    <line x1="30" y1="60" x2="15" y2="82" stroke="#FBBF24" stroke-width="2"/>
    <line x1="30" y1="60" x2="45" y2="82" stroke="#FBBF24" stroke-width="2"/>
    <text x="30" y="100" text-anchor="middle" fill="#FBBF24" font-size="11" font-weight="700">Manager</text>
    <text x="30" y="114" text-anchor="middle" fill="#475569" font-size="9">(Extended Role)</text>
  </g>

  <!-- System -->
  <g transform="translate(1090,350)">
    <rect x="0" y="5" width="60" height="50" rx="8" fill="none" stroke="#34D399" stroke-width="2"/>
    <text x="30" y="35" text-anchor="middle" fill="#34D399" font-size="16">⚙</text>
    <text x="30" y="72" text-anchor="middle" fill="#34D399" font-size="11" font-weight="700">System</text>
    <text x="30" y="86" text-anchor="middle" fill="#475569" font-size="9">(Automated)</text>
  </g>

  <!-- USE CASE GROUPS -->

  <!-- Project Management -->
  <rect x="180" y="80" width="280" height="195" rx="12" fill="#12141A" stroke="#6C63FF" stroke-width="1" filter="url(#shadow3)"/>
  <text x="320" y="102" text-anchor="middle" fill="#6C63FF" font-size="11" font-weight="700">Project Management</text>
  <ellipse cx="320" cy="128" rx="100" ry="14" fill="#6C63FF10" stroke="#6C63FF40"/>
  <text x="320" y="132" text-anchor="middle" fill="#918AFF" font-size="10">Create Project</text>
  <ellipse cx="320" cy="158" rx="100" ry="14" fill="#6C63FF10" stroke="#6C63FF40"/>
  <text x="320" y="162" text-anchor="middle" fill="#918AFF" font-size="10">View Project Dashboard</text>
  <ellipse cx="320" cy="188" rx="100" ry="14" fill="#6C63FF10" stroke="#6C63FF40"/>
  <text x="320" y="192" text-anchor="middle" fill="#918AFF" font-size="10">Update Project Status</text>
  <ellipse cx="320" cy="218" rx="100" ry="14" fill="#6C63FF10" stroke="#6C63FF40"/>
  <text x="320" y="222" text-anchor="middle" fill="#918AFF" font-size="10">Set Deadline</text>
  <ellipse cx="320" cy="248" rx="100" ry="14" fill="#6C63FF10" stroke="#6C63FF40"/>
  <text x="320" y="252" text-anchor="middle" fill="#918AFF" font-size="10">Archive / Delete Project</text>

  <!-- Task Management -->
  <rect x="180" y="290" width="280" height="225" rx="12" fill="#12141A" stroke="#34D399" stroke-width="1" filter="url(#shadow3)"/>
  <text x="320" y="312" text-anchor="middle" fill="#34D399" font-size="11" font-weight="700">Task Management</text>
  <ellipse cx="320" cy="338" rx="110" ry="14" fill="#34D39910" stroke="#34D39940"/>
  <text x="320" y="342" text-anchor="middle" fill="#34D399" font-size="10">Create Task</text>
  <ellipse cx="320" cy="368" rx="110" ry="14" fill="#34D39910" stroke="#34D39940"/>
  <text x="320" y="372" text-anchor="middle" fill="#34D399" font-size="10">Move Task (Kanban)</text>
  <ellipse cx="320" cy="398" rx="110" ry="14" fill="#34D39910" stroke="#34D39940"/>
  <text x="320" y="402" text-anchor="middle" fill="#34D399" font-size="10">Set Priority &amp; Deadline</text>
  <ellipse cx="320" cy="428" rx="110" ry="14" fill="#34D39910" stroke="#34D39940"/>
  <text x="320" y="432" text-anchor="middle" fill="#34D399" font-size="10">Add Subtasks / Checklist</text>
  <ellipse cx="320" cy="458" rx="110" ry="14" fill="#34D39910" stroke="#34D39940"/>
  <text x="320" y="462" text-anchor="middle" fill="#34D399" font-size="10">Edit / Delete Task</text>
  <ellipse cx="320" cy="488" rx="110" ry="14" fill="#34D39910" stroke="#34D39940"/>
  <text x="320" y="492" text-anchor="middle" fill="#34D399" font-size="10">Filter &amp; Search Tasks</text>

  <!-- Time Tracking -->
  <rect x="500" y="80" width="260" height="195" rx="12" fill="#12141A" stroke="#60A5FA" stroke-width="1" filter="url(#shadow3)"/>
  <text x="630" y="102" text-anchor="middle" fill="#60A5FA" font-size="11" font-weight="700">Time Tracking</text>
  <ellipse cx="630" cy="128" rx="100" ry="14" fill="#60A5FA10" stroke="#60A5FA40"/>
  <text x="630" y="132" text-anchor="middle" fill="#60A5FA" font-size="10">Start / Stop Timer</text>
  <ellipse cx="630" cy="158" rx="100" ry="14" fill="#60A5FA10" stroke="#60A5FA40"/>
  <text x="630" y="162" text-anchor="middle" fill="#60A5FA" font-size="10">Log Manual Entry</text>
  <ellipse cx="630" cy="188" rx="100" ry="14" fill="#60A5FA10" stroke="#60A5FA40"/>
  <text x="630" y="192" text-anchor="middle" fill="#60A5FA" font-size="10">View Time Reports</text>
  <ellipse cx="630" cy="218" rx="100" ry="14" fill="#60A5FA10" stroke="#60A5FA40"/>
  <text x="630" y="222" text-anchor="middle" fill="#60A5FA" font-size="10">Estimate Task Duration</text>
  <ellipse cx="630" cy="248" rx="100" ry="14" fill="#60A5FA10" stroke="#60A5FA40"/>
  <text x="630" y="252" text-anchor="middle" fill="#60A5FA" font-size="10">Delete Time Entry</text>

  <!-- Analytics -->
  <rect x="500" y="290" width="260" height="225" rx="12" fill="#12141A" stroke="#FBBF24" stroke-width="1" filter="url(#shadow3)"/>
  <text x="630" y="312" text-anchor="middle" fill="#FBBF24" font-size="11" font-weight="700">Analytics &amp; Metrics</text>
  <ellipse cx="630" cy="340" rx="105" ry="14" fill="#FBBF2410" stroke="#FBBF2440"/>
  <text x="630" y="344" text-anchor="middle" fill="#FBBF24" font-size="10">Completion Rate</text>
  <ellipse cx="630" cy="370" rx="105" ry="14" fill="#FBBF2410" stroke="#FBBF2440"/>
  <text x="630" y="374" text-anchor="middle" fill="#FBBF24" font-size="10">Task Status Distribution</text>
  <ellipse cx="630" cy="400" rx="105" ry="14" fill="#FBBF2410" stroke="#FBBF2440"/>
  <text x="630" y="404" text-anchor="middle" fill="#FBBF24" font-size="10">Time Distribution</text>
  <ellipse cx="630" cy="430" rx="105" ry="14" fill="#FBBF2410" stroke="#FBBF2440"/>
  <text x="630" y="434" text-anchor="middle" fill="#FBBF24" font-size="10">Priority Breakdown</text>
  <ellipse cx="630" cy="460" rx="105" ry="14" fill="#FBBF2410" stroke="#FBBF2440"/>
  <text x="630" y="464" text-anchor="middle" fill="#FBBF24" font-size="10">Project Health Overview</text>
  <ellipse cx="630" cy="490" rx="105" ry="14" fill="#FBBF2410" stroke="#FBBF2440"/>
  <text x="630" y="494" text-anchor="middle" fill="#FBBF24" font-size="10">Export Reports (Planned)</text>

  <!-- Calendar & Milestones -->
  <rect x="800" y="80" width="250" height="180" rx="12" fill="#12141A" stroke="#C084FC" stroke-width="1" filter="url(#shadow3)"/>
  <text x="925" y="102" text-anchor="middle" fill="#C084FC" font-size="11" font-weight="700">Calendar &amp; Milestones</text>
  <ellipse cx="925" cy="130" rx="95" ry="14" fill="#C084FC10" stroke="#C084FC40"/>
  <text x="925" y="134" text-anchor="middle" fill="#C084FC" font-size="10">View Calendar Grid</text>
  <ellipse cx="925" cy="160" rx="95" ry="14" fill="#C084FC10" stroke="#C084FC40"/>
  <text x="925" y="164" text-anchor="middle" fill="#C084FC" font-size="10">Create / Edit Milestone</text>
  <ellipse cx="925" cy="190" rx="95" ry="14" fill="#C084FC10" stroke="#C084FC40"/>
  <text x="925" y="194" text-anchor="middle" fill="#C084FC" font-size="10">View Upcoming Deadlines</text>
  <ellipse cx="925" cy="220" rx="95" ry="14" fill="#C084FC10" stroke="#C084FC40"/>
  <text x="925" y="224" text-anchor="middle" fill="#C084FC" font-size="10">Set Reminders (Planned)</text>

  <!-- Account & Settings -->
  <rect x="800" y="290" width="250" height="180" rx="12" fill="#12141A" stroke="#F87171" stroke-width="1" filter="url(#shadow3)"/>
  <text x="925" y="312" text-anchor="middle" fill="#F87171" font-size="11" font-weight="700">Account &amp; Settings</text>
  <ellipse cx="925" cy="340" rx="95" ry="14" fill="#F8717110" stroke="#F8717140"/>
  <text x="925" y="344" text-anchor="middle" fill="#F87171" font-size="10">Login / Register (Planned)</text>
  <ellipse cx="925" cy="370" rx="95" ry="14" fill="#F8717110" stroke="#F8717140"/>
  <text x="925" y="374" text-anchor="middle" fill="#F87171" font-size="10">Edit Profile</text>
  <ellipse cx="925" cy="400" rx="95" ry="14" fill="#F8717110" stroke="#F8717140"/>
  <text x="925" y="404" text-anchor="middle" fill="#F87171" font-size="10">Configure Notifications</text>
  <ellipse cx="925" cy="430" rx="95" ry="14" fill="#F8717110" stroke="#F8717140"/>
  <text x="925" y="434" text-anchor="middle" fill="#F87171" font-size="10">Theme Preferences</text>

  <!-- Connection lines: Employee → Use Cases -->
  <line x1="120" y1="225" x2="180" y2="150" stroke="#6C63FF" stroke-width="0.8" opacity="0.4"/>
  <line x1="120" y1="250" x2="180" y2="370" stroke="#34D399" stroke-width="0.8" opacity="0.4"/>
  <line x1="120" y1="220" x2="500" y2="170" stroke="#60A5FA" stroke-width="0.8" opacity="0.3"/>
  <line x1="120" y1="280" x2="500" y2="370" stroke="#FBBF24" stroke-width="0.8" opacity="0.3"/>
  <line x1="120" y1="240" x2="800" y2="160" stroke="#C084FC" stroke-width="0.8" opacity="0.2"/>

  <!-- Manager → Use Cases -->
  <line x1="120" y1="495" x2="180" y2="248" stroke="#6C63FF" stroke-width="0.8" opacity="0.3" stroke-dasharray="4 3"/>
  <line x1="120" y1="510" x2="500" y2="450" stroke="#FBBF24" stroke-width="0.8" opacity="0.3" stroke-dasharray="4 3"/>
  <line x1="120" y1="520" x2="800" y2="400" stroke="#F87171" stroke-width="0.8" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- System → automated -->
  <line x1="1090" y1="390" x2="830" y2="220" stroke="#34D399" stroke-width="0.8" opacity="0.4" stroke-dasharray="4 3"/>
  <line x1="1090" y1="380" x2="830" y2="190" stroke="#34D399" stroke-width="0.8" opacity="0.4" stroke-dasharray="4 3"/>

  <!-- Legend -->
  <rect x="180" y="540" width="880" height="90" rx="12" fill="#12141A" stroke="#2A2D35"/>
  <text x="200" y="564" fill="#F1F5F9" font-size="12" font-weight="700">Legend</text>
  <line x1="200" y1="582" x2="240" y2="582" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="250" y="586" fill="#94A3B8" font-size="10">Employee access</text>
  <line x1="380" y1="582" x2="420" y2="582" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="430" y="586" fill="#94A3B8" font-size="10">Manager access</text>
  <line x1="580" y1="582" x2="620" y2="582" stroke="#34D399" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="630" y="586" fill="#94A3B8" font-size="10">System automated</text>
  <ellipse cx="810" cy="580" rx="30" ry="10" fill="#6C63FF10" stroke="#6C63FF40"/>
  <text x="850" y="584" fill="#94A3B8" font-size="10">Use case</text>
  <text x="200" y="614" fill="#475569" font-size="9">Each colored group represents a module. Ellipses are individual use cases. Lines show which actors can perform which actions.</text>
</svg>
