<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#475569"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#6C63FF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="700" rx="16" fill="#0B0D11"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#F1F5F9" font-size="22" font-weight="800" font-family="Plus Jakarta Sans, Inter, sans-serif">Application Navigation Flow</text>
  <text x="550" y="58" text-anchor="middle" fill="#94A3B8" font-size="12">How users navigate between pages via sidebar and cross-page links</text>

  <!-- Entry Point -->
  <ellipse cx="550" cy="105" rx="80" ry="26" fill="url(#primaryGrad)" filter="url(#shadow2)"/>
  <text x="550" y="110" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">User Opens App</text>

  <!-- Auth Check Diamond -->
  <polygon points="550,148 620,185 550,222 480,185" fill="#181B22" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="550" y="188" text-anchor="middle" fill="#FBBF24" font-size="10" font-weight="600">Auth?</text>

  <!-- Login -->
  <rect x="280" y="170" width="130" height="34" rx="8" fill="#181B22" stroke="#F87171" filter="url(#shadow2)"/>
  <text x="345" y="191" text-anchor="middle" fill="#F87171" font-size="11">Login / Register</text>
  <line x1="480" y1="185" x2="410" y2="185" stroke="#F87171" marker-end="url(#arrow)"/>
  <text x="445" y="178" fill="#F87171" font-size="9">No</text>
  <path d="M 310 204 Q 310 230 420 230 Q 530 230 530 160" fill="none" stroke="#F87171" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Arrow down to Dashboard -->
  <line x1="550" y1="222" x2="550" y2="262" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="562" y="245" fill="#34D399" font-size="9">Yes</text>

  <!-- Dashboard (center hub) -->
  <rect x="470" y="262" width="160" height="44" rx="12" fill="#12141A" stroke="#6C63FF" stroke-width="2" filter="url(#shadow2)"/>
  <text x="550" y="288" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="700">Dashboard</text>

  <!-- Page nodes - arranged in a circle around dashboard -->
  <!-- Projects (left) -->
  <rect x="60" y="330" width="140" height="40" rx="10" fill="#12141A" stroke="#918AFF" filter="url(#shadow2)"/>
  <text x="130" y="354" text-anchor="middle" fill="#918AFF" font-size="11" font-weight="600">Projects</text>

  <!-- Tasks -->
  <rect x="60" y="400" width="140" height="40" rx="10" fill="#12141A" stroke="#34D399" filter="url(#shadow2)"/>
  <text x="130" y="424" text-anchor="middle" fill="#34D399" font-size="11" font-weight="600">Tasks (Kanban)</text>

  <!-- Calendar -->
  <rect x="60" y="470" width="140" height="40" rx="10" fill="#12141A" stroke="#C084FC" filter="url(#shadow2)"/>
  <text x="130" y="494" text-anchor="middle" fill="#C084FC" font-size="11" font-weight="600">Calendar</text>

  <!-- Time Tracking -->
  <rect x="260" y="470" width="155" height="40" rx="10" fill="#12141A" stroke="#60A5FA" filter="url(#shadow2)"/>
  <text x="337" y="494" text-anchor="middle" fill="#60A5FA" font-size="11" font-weight="600">Time Tracking</text>

  <!-- Milestones -->
  <rect x="680" y="470" width="140" height="40" rx="10" fill="#12141A" stroke="#FBBF24" filter="url(#shadow2)"/>
  <text x="750" y="494" text-anchor="middle" fill="#FBBF24" font-size="11" font-weight="600">Milestones</text>

  <!-- Analytics -->
  <rect x="880" y="470" width="140" height="40" rx="10" fill="#12141A" stroke="#F87171" filter="url(#shadow2)"/>
  <text x="950" y="494" text-anchor="middle" fill="#F87171" font-size="11" font-weight="600">Analytics</text>

  <!-- Profile -->
  <rect x="880" y="330" width="140" height="40" rx="10" fill="#12141A" stroke="#2A2D35" filter="url(#shadow2)"/>
  <text x="950" y="354" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="600">Profile</text>

  <!-- Settings -->
  <rect x="880" y="400" width="140" height="40" rx="10" fill="#12141A" stroke="#2A2D35" filter="url(#shadow2)"/>
  <text x="950" y="424" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="600">Settings</text>

  <!-- Lines from Dashboard to all pages (sidebar nav) -->
  <line x1="470" y1="284" x2="200" y2="350" stroke="#918AFF" stroke-width="1" opacity="0.5"/>
  <line x1="470" y1="290" x2="200" y2="420" stroke="#34D399" stroke-width="1" opacity="0.5"/>
  <line x1="480" y1="306" x2="200" y2="490" stroke="#C084FC" stroke-width="1" opacity="0.5"/>
  <line x1="530" y1="306" x2="415" y2="480" stroke="#60A5FA" stroke-width="1" opacity="0.5"/>
  <line x1="570" y1="306" x2="680" y2="480" stroke="#FBBF24" stroke-width="1" opacity="0.5"/>
  <line x1="620" y1="306" x2="880" y2="480" stroke="#F87171" stroke-width="1" opacity="0.5"/>
  <line x1="630" y1="284" x2="880" y2="350" stroke="#475569" stroke-width="1" opacity="0.4"/>
  <line x1="630" y1="290" x2="880" y2="420" stroke="#475569" stroke-width="1" opacity="0.4"/>

  <!-- Cross-page connections -->
  <!-- Tasks ↔ Time Tracking -->
  <path d="M 200 430 Q 260 460 260 480" fill="none" stroke="#60A5FA" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="215" y="458" fill="#60A5FA" font-size="8" opacity="0.7">Start timer</text>

  <!-- Projects ↔ Tasks -->
  <line x1="130" y1="370" x2="130" y2="400" stroke="#34D399" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <text x="142" y="388" fill="#34D399" font-size="8" opacity="0.7">View tasks</text>

  <!-- Milestones → Projects -->
  <path d="M 750 470 Q 750 400 400 360 Q 200 340 200 348" fill="none" stroke="#FBBF24" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Analytics → Projects -->
  <path d="M 880 490 Q 500 560 200 360" fill="none" stroke="#F87171" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>

  <!-- Sidebar label -->
  <rect x="430" y="326" width="240" height="24" rx="6" fill="#6C63FF10" stroke="#6C63FF30"/>
  <text x="550" y="342" text-anchor="middle" fill="#6C63FF" font-size="9" font-weight="600">Sidebar Navigation (all pages accessible)</text>

  <!-- Legend -->
  <rect x="60" y="570" width="980" height="110" rx="12" fill="#12141A" stroke="#2A2D35"/>
  <text x="80" y="594" fill="#F1F5F9" font-size="12" font-weight="700">Legend</text>

  <line x1="80" y1="614" x2="120" y2="614" stroke="#6C63FF" stroke-width="2"/>
  <text x="130" y="618" fill="#94A3B8" font-size="10">Sidebar navigation (direct)</text>

  <line x1="80" y1="636" x2="120" y2="636" stroke="#60A5FA" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="130" y="640" fill="#94A3B8" font-size="10">Cross-page link (contextual)</text>

  <rect x="330" y="606" width="14" height="14" rx="4" fill="#181B22" stroke="#6C63FF"/>
  <text x="352" y="618" fill="#94A3B8" font-size="10">Main pages (sidebar)</text>

  <rect x="330" y="628" width="14" height="14" rx="4" fill="#181B22" stroke="#2A2D35"/>
  <text x="352" y="640" fill="#94A3B8" font-size="10">Utility pages</text>

  <polygon points="570,611 585,618 570,625 555,618" fill="#181B22" stroke="#FBBF24"/>
  <text x="595" y="622" fill="#94A3B8" font-size="10">Decision point</text>

  <ellipse cx="570" cy="640" rx="15" ry="10" fill="#6C63FF"/>
  <text x="595" y="644" fill="#94A3B8" font-size="10">Entry/Exit point</text>

  <text x="770" y="618" fill="#94A3B8" font-size="10">Colors match each page's accent in the UI</text>
  <text x="770" y="638" fill="#94A3B8" font-size="10">All pages return to Dashboard via sidebar</text>
</svg>
