<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" width="900" height="1100" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <!-- Gradient for flow lines -->
    <linearGradient id="flowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="flowGradH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#918AFF" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Decision diamond gradients -->
    <linearGradient id="diamondFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181B22"/>
      <stop offset="100%" stop-color="#12141A"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowStrong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6C63FF" opacity="0.8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34D399" opacity="0.8"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#FBBF24" opacity="0.7"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#F87171" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1100" fill="#0B0D11" rx="0"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="1100" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="1100" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="1100" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="1100" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="1100" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="1100" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="1100" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="1100" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="1100" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="1100" stroke="#F1F5F9" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#F1F5F9" font-size="18" font-weight="700" letter-spacing="-0.02em" font-family="'Plus Jakarta Sans', 'Inter', sans-serif">Task Lifecycle Activity Diagram</text>
  <text x="450" y="50" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="400">ProjectPulse</text>

  <!-- ===== 1. START NODE ===== -->
  <circle cx="450" cy="80" r="14" fill="#6C63FF" filter="url(#glowStrong)"/>
  <circle cx="450" cy="80" r="8" fill="#0B0D11"/>
  <circle cx="450" cy="80" r="5" fill="#6C63FF"/>

  <!-- Arrow: Start -> Create New Task -->
  <line x1="450" y1="94" x2="450" y2="108" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 2. Create New Task ===== -->
  <rect x="325" y="110" width="250" height="36" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
  <text x="450" y="133" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="600">Create New Task</text>

  <!-- Arrow -->
  <line x1="450" y1="146" x2="450" y2="158" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 3. Fill Details ===== -->
  <rect x="295" y="160" width="310" height="36" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
  <text x="450" y="183" text-anchor="middle" fill="#F1F5F9" font-size="12" font-weight="500">Fill Title, Description, Priority, Deadline</text>

  <!-- Arrow -->
  <line x1="450" y1="196" x2="450" y2="214" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 4. DECISION: Assign to Project? ===== -->
  <g transform="translate(450, 248)">
    <polygon points="0,-34 100,0 0,34 -100,0" fill="url(#diamondFill)" stroke="#FBBF24" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#FBBF24" font-size="10" font-weight="600">Assign to</text>
    <text x="0" y="9" text-anchor="middle" fill="#FBBF24" font-size="10" font-weight="600">Project?</text>
  </g>

  <!-- Yes branch (left) -->
  <line x1="350" y1="248" x2="230" y2="248" stroke="#FBBF24" stroke-width="1.2" marker-end="url(#arrowYellow)" opacity="0.7"/>
  <text x="300" y="241" text-anchor="middle" fill="#34D399" font-size="10" font-weight="600">Yes</text>

  <!-- "Select Project" box (left) -->
  <rect x="120" y="232" width="160" height="32" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
  <text x="200" y="253" text-anchor="middle" fill="#F1F5F9" font-size="12" font-weight="500">Select Project</text>

  <!-- No branch (right) -->
  <line x1="550" y1="248" x2="610" y2="248" stroke="#FBBF24" stroke-width="1.2" marker-end="url(#arrowYellow)" opacity="0.7"/>
  <text x="585" y="241" text-anchor="middle" fill="#F87171" font-size="10" font-weight="600">No</text>

  <!-- "Add to Personal Backlog" box (right) -->
  <rect x="610" y="232" width="190" height="32" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
  <text x="705" y="253" text-anchor="middle" fill="#F1F5F9" font-size="12" font-weight="500">Add to Personal Backlog</text>

  <!-- Merge lines from both branches down -->
  <line x1="200" y1="264" x2="200" y2="302" stroke="#6C63FF" stroke-width="1.2" opacity="0.6"/>
  <line x1="200" y1="302" x2="450" y2="302" stroke="#6C63FF" stroke-width="1.2" opacity="0.6"/>
  <line x1="705" y1="264" x2="705" y2="302" stroke="#6C63FF" stroke-width="1.2" opacity="0.6"/>
  <line x1="705" y1="302" x2="450" y2="302" stroke="#6C63FF" stroke-width="1.2" opacity="0.6"/>

  <!-- Merge dot -->
  <circle cx="450" cy="302" r="4" fill="#6C63FF" opacity="0.8"/>

  <!-- Arrow to next -->
  <line x1="450" y1="306" x2="450" y2="318" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 5. Set Time Estimate ===== -->
  <rect x="325" y="320" width="250" height="36" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
  <text x="450" y="343" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="500">Set Time Estimate</text>

  <!-- Arrow -->
  <line x1="450" y1="356" x2="450" y2="374" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 6. DECISION: Add Subtasks? ===== -->
  <g transform="translate(450, 406)">
    <polygon points="0,-32 90,0 0,32 -90,0" fill="url(#diamondFill)" stroke="#918AFF" stroke-width="1.5"/>
    <text x="0" y="-3" text-anchor="middle" fill="#918AFF" font-size="10" font-weight="600">Add</text>
    <text x="0" y="10" text-anchor="middle" fill="#918AFF" font-size="10" font-weight="600">Subtasks?</text>
  </g>

  <!-- Yes branch (left) -->
  <line x1="360" y1="406" x2="250" y2="406" stroke="#918AFF" stroke-width="1.2" opacity="0.7"/>
  <text x="315" y="399" text-anchor="middle" fill="#34D399" font-size="10" font-weight="600">Yes</text>

  <!-- "Create Subtask Checklist" box -->
  <rect x="95" y="390" width="200" height="32" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
  <text x="195" y="411" text-anchor="middle" fill="#F1F5F9" font-size="12" font-weight="500">Create Subtask Checklist</text>

  <!-- No branch (right) -->
  <line x1="540" y1="406" x2="610" y2="406" stroke="#918AFF" stroke-width="1.2" opacity="0.7"/>
  <text x="578" y="399" text-anchor="middle" fill="#F87171" font-size="10" font-weight="600">No</text>

  <!-- Merge lines -->
  <line x1="195" y1="422" x2="195" y2="456" stroke="#6C63FF" stroke-width="1.2" opacity="0.6"/>
  <line x1="195" y1="456" x2="450" y2="456" stroke="#6C63FF" stroke-width="1.2" opacity="0.6"/>
  <line x1="610" y1="406" x2="640" y2="406" stroke="#918AFF" stroke-width="1.2" opacity="0.6"/>
  <line x1="640" y1="406" x2="640" y2="456" stroke="#6C63FF" stroke-width="1.2" opacity="0.6"/>
  <line x1="640" y1="456" x2="450" y2="456" stroke="#6C63FF" stroke-width="1.2" opacity="0.6"/>

  <!-- Merge dot -->
  <circle cx="450" cy="456" r="4" fill="#6C63FF" opacity="0.8"/>

  <!-- Arrow -->
  <line x1="450" y1="460" x2="450" y2="474" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 7. Task Ready — Status: To Do ===== -->
  <rect x="305" y="476" width="290" height="38" rx="8" fill="#12141A" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="450" y="500" text-anchor="middle" fill="#60A5FA" font-size="13" font-weight="700">Task Ready — Status: To Do</text>

  <!-- Arrow -->
  <line x1="450" y1="514" x2="450" y2="528" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 8. Move to In Progress ===== -->
  <rect x="325" y="530" width="250" height="36" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
  <text x="450" y="553" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="500">Move to In Progress</text>

  <!-- Arrow -->
  <line x1="450" y1="566" x2="450" y2="580" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 9. Start Time Tracker (anchor for loop-back) ===== -->
  <rect x="325" y="582" width="250" height="36" rx="8" fill="#12141A" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="450" y="605" text-anchor="middle" fill="#FBBF24" font-size="13" font-weight="700">Start Time Tracker</text>

  <!-- Arrow -->
  <line x1="450" y1="618" x2="450" y2="632" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 10. Work on Task (anchor for loop-back) ===== -->
  <rect x="325" y="634" width="250" height="36" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
  <text x="450" y="657" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="500">Work on Task</text>

  <!-- Arrow -->
  <line x1="450" y1="670" x2="450" y2="690" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 11. DECISION: All Subtasks Done? ===== -->
  <g transform="translate(450, 724)">
    <polygon points="0,-34 105,0 0,34 -105,0" fill="url(#diamondFill)" stroke="#918AFF" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#918AFF" font-size="10" font-weight="600">All Subtasks</text>
    <text x="0" y="9" text-anchor="middle" fill="#918AFF" font-size="10" font-weight="600">Done?</text>
  </g>

  <!-- No branch (right) — loops back to "Work on Task" -->
  <line x1="555" y1="724" x2="630" y2="724" stroke="#F87171" stroke-width="1.2" opacity="0.7"/>
  <text x="595" y="717" text-anchor="middle" fill="#F87171" font-size="10" font-weight="600">No</text>
  <line x1="630" y1="724" x2="630" y2="652" stroke="#F87171" stroke-width="1.2" opacity="0.5"/>
  <line x1="630" y1="652" x2="575" y2="652" stroke="#F87171" stroke-width="1.2" marker-end="url(#arrowRed)" opacity="0.5"/>

  <!-- Yes branch (down) -->
  <line x1="450" y1="758" x2="450" y2="772" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>
  <text x="465" y="767" fill="#34D399" font-size="10" font-weight="600">Yes</text>

  <!-- ===== 12. Stop Timer ===== -->
  <rect x="325" y="774" width="250" height="36" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
  <text x="450" y="797" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="500">Stop Timer</text>

  <!-- Arrow -->
  <line x1="450" y1="810" x2="450" y2="824" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 13. Move to In Review ===== -->
  <rect x="325" y="826" width="250" height="36" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
  <text x="450" y="849" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="500">Move to In Review</text>

  <!-- Arrow -->
  <line x1="450" y1="862" x2="450" y2="880" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ===== 14. DECISION: Review Passed? ===== -->
  <g transform="translate(450, 914)">
    <polygon points="0,-34 100,0 0,34 -100,0" fill="url(#diamondFill)" stroke="#F87171" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#F87171" font-size="10" font-weight="600">Review</text>
    <text x="0" y="9" text-anchor="middle" fill="#F87171" font-size="10" font-weight="600">Passed?</text>
  </g>

  <!-- No branch (left) — loops back to "Start Time Tracker" -->
  <line x1="350" y1="914" x2="230" y2="914" stroke="#F87171" stroke-width="1.2" opacity="0.7"/>
  <text x="300" y="907" text-anchor="middle" fill="#F87171" font-size="10" font-weight="600">No</text>

  <!-- "Move Back to In Progress" box -->
  <rect x="80" y="898" width="200" height="32" rx="8" fill="#12141A" stroke="#F87171" stroke-width="1" opacity="0.8"/>
  <text x="180" y="919" text-anchor="middle" fill="#F1F5F9" font-size="11" font-weight="500">Move Back to In Progress</text>

  <!-- Loop-back line from "Move Back" up to "Start Time Tracker" -->
  <line x1="180" y1="898" x2="180" y2="600" stroke="#F87171" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.45"/>
  <line x1="180" y1="600" x2="325" y2="600" stroke="#F87171" stroke-width="1.2" marker-end="url(#arrowRed)" stroke-dasharray="4,3" opacity="0.45"/>

  <!-- Yes branch (down) -->
  <line x1="450" y1="948" x2="450" y2="964" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.8"/>
  <text x="465" y="959" fill="#34D399" font-size="10" font-weight="600">Yes</text>

  <!-- ===== 15. Move to Done ===== -->
  <rect x="325" y="966" width="250" height="38" rx="8" fill="#12141A" stroke="#34D399" stroke-width="1.5"/>
  <text x="450" y="990" text-anchor="middle" fill="#34D399" font-size="13" font-weight="700">Move to Done</text>

  <!-- Arrow -->
  <line x1="450" y1="1004" x2="450" y2="1018" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.8"/>

  <!-- ===== 16. Log Completion Metrics ===== -->
  <rect x="315" y="1020" width="270" height="36" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
  <text x="450" y="1043" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="500">Log Completion Metrics</text>

  <!-- Arrow -->
  <line x1="450" y1="1056" x2="450" y2="1068" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.8"/>

  <!-- ===== 17. END NODE ===== -->
  <circle cx="450" cy="1082" r="14" fill="none" stroke="#34D399" stroke-width="2" filter="url(#glowStrong)"/>
  <circle cx="450" cy="1082" r="8" fill="#34D399"/>

</svg>