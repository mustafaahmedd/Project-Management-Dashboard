      <ellipse cx="562" cy="272" rx="62" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="562" y="276" text-anchor="middle">Productivity Trends</text>
      <ellipse cx="695" cy="272" rx="52" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="695" y="276" text-anchor="middle">Sprint Velocity</text>
      <ellipse cx="562" cy="306" rx="60" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="562" y="310" text-anchor="middle">Time Distribution</text>
      <ellipse cx="695" cy="306" rx="56" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="695" y="310" text-anchor="middle">Value Delivered</text>
      <ellipse cx="625" cy="340" rx="52" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="625" y="344" text-anchor="middle">Export Reports</text>
    </g>
