    <rect x="490" y="228" width="270" height="170" rx="8" fill="#12141A" stroke="#FBBF24" stroke-width="1.5" opacity="0.95"/>
    <rect x="490" y="228" width="270" height="26" rx="8" fill="#FBBF24" opacity="0.12"/>
    <text x="625" y="246" text-anchor="middle" fill="#FBBF24" font-size="11" font-weight="700">ANALYTICS</text>
