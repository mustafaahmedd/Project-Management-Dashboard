      <text x="862" y="120" text-anchor="middle">View Calendar</text>
      <ellipse cx="995" cy="116" rx="58" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="995" y="120" text-anchor="middle">Create Milestones</text>
      <ellipse cx="862" cy="155" rx="52" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="862" y="159" text-anchor="middle">Set Reminders</text>
      <ellipse cx="995" cy="155" rx="52" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="995" y="159" text-anchor="middle">View Deadlines</text>
    </g>
  </g>

  <!-- GROUP 6: Account & Settings -->
