  <!-- ==================== CONNECTING LINES ==================== -->

  <!-- Employee connections (from ~104, 200) -->
  <!-- Employee -> Project Management (rows 1-3: Create, View Dashboard, Update Status) -->
  <line x1="104" y1="190" x2="190" y2="116" stroke="#6C63FF" stroke-width="1" opacity="0.35"/>
  <line x1="104" y1="195" x2="190" y2="135" stroke="#6C63FF" stroke-width="1" opacity="0.35"/>
  <line x1="104" y1="200" x2="190" y2="150" stroke="#6C63FF" stroke-width="1" opacity="0.35"/>

  <!-- Employee -> Task Management (all) -->
  <line x1="104" y1="210" x2="190" y2="298" stroke="#34D399" stroke-width="1" opacity="0.3"/>
  <line x1="104" y1="215" x2="190" y2="332" stroke="#34D399" stroke-width="1" opacity="0.3"/>
  <line x1="104" y1="218" x2="190" y2="366" stroke="#34D399" stroke-width="1" opacity="0.3"/>

  <!-- Employee -> Time Tracking (all) -->
  <line x1="104" y1="185" x2="490" y2="116" stroke="#60A5FA" stroke-width="1" opacity="0.25"/>
  <line x1="104" y1="188" x2="490" y2="150" stroke="#60A5FA" stroke-width="1" opacity="0.25"/>

  <!-- Employee -> Analytics (Productivity Trends, Time Distribution) -->
  <line x1="104" y1="195" x2="490" y2="272" stroke="#FBBF24" stroke-width="1" opacity="0.2"/>
  <line x1="104" y1="200" x2="490" y2="306" stroke="#FBBF24" stroke-width="1" opacity="0.2"/>

  <!-- Employee -> Calendar (View Calendar, Create Milestones) -->
  <line x1="104" y1="183" x2="790" y2="116" stroke="#C084FC" stroke-width="1" opacity="0.2"/>
  <line x1="104" y1="186" x2="790" y2="135" stroke="#C084FC" stroke-width="1" opacity="0.2"/>

  <!-- Employee -> Account (Register/Login, Edit Profile, Notifications, Theme) -->
  <line x1="104" y1="210" x2="790" y2="292" stroke="#F87171" stroke-width="1" opacity="0.2"/>
  <line x1="104" y1="213" x2="790" y2="326" stroke="#F87171" stroke-width="1" opacity="0.2"/>
  <line x1="104" y1="216" x2="790" y2="360" stroke="#F87171" stroke-width="1" opacity="0.2"/>

  <!-- Manager connections (from ~104, 400) -->
  <!-- Manager -> Project Management (rows 4-6: Set Deadline, Assign Members, Archive/Delete) -->
  <line x1="104" y1="390" x2="190" y2="150" stroke="#FBBF24" stroke-width="1" opacity="0.35"/>
  <line x1="104" y1="395" x2="190" y2="170" stroke="#FBBF24" stroke-width="1" opacity="0.35"/>
  <line x1="104" y1="400" x2="190" y2="184" stroke="#FBBF24" stroke-width="1" opacity="0.35"/>

  <!-- Manager -> Analytics (Sprint Velocity, Value Delivered, Export Reports) -->
  <line x1="104" y1="395" x2="490" y2="272" stroke="#FBBF24" stroke-width="1" opacity="0.25"/>
  <line x1="104" y1="398" x2="490" y2="306" stroke="#FBBF24" stroke-width="1" opacity="0.25"/>
  <line x1="104" y1="402" x2="490" y2="340" stroke="#FBBF24" stroke-width="1" opacity="0.25"/>

  <!-- Manager -> Calendar (Create Milestones, View Deadlines) -->
  <line x1="104" y1="388" x2="790" y2="116" stroke="#C084FC" stroke-width="1" opacity="0.2"/>
  <line x1="104" y1="392" x2="790" y2="155" stroke="#C084FC" stroke-width="1" opacity="0.2"/>

  <!-- Manager -> Account (Integrations) -->
  <line x1="104" y1="408" x2="790" y2="326" stroke="#F87171" stroke-width="1" opacity="0.2"/>

  <!-- System connections (from ~104, 590) -->
  <!-- System -> Calendar (Set Reminders, View Deadlines) -->
  <line x1="104" y1="575" x2="790" y2="155" stroke="#34D399" stroke-width="1" opacity="0.3"/>
  <line x1="104" y1="580" x2="790" y2="168" stroke="#34D399" stroke-width="1" opacity="0.3"/>

  <!-- System -> Analytics (Productivity Trends) -->
  <line x1="104" y1="585" x2="490" y2="272" stroke="#34D399" stroke-width="1" opacity="0.25"/>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(190, 460)">
    <rect x="0" y="0" width="870" height="60" rx="8" fill="#12141A" stroke="#2A2D35" stroke-width="1"/>
    <text x="20" y="22" fill="#94A3B8" font-size="10" font-weight="600">LEGEND</text>

    <circle cx="20" cy="42" r="6" fill="#12141A" stroke="#6C63FF" stroke-width="1.5"/>
    <text x="32" y="46" fill="#6C63FF" font-size="9">Employee</text>

    <circle cx="120" cy="42" r="6" fill="#12141A" stroke="#FBBF24" stroke-width="1.5"/>
    <text x="132" y="46" fill="#FBBF24" font-size="9">Manager</text>

    <circle cx="210" cy="42" r="6" fill="#12141A" stroke="#34D399" stroke-width="1.5"/>
    <text x="222" y="46" fill="#34D399" font-size="9">System</text>

    <line x1="310" y1="42" x2="340" y2="42" stroke="#6C63FF" stroke-width="1" opacity="0.5"/>
    <text x="348" y="46" fill="#94A3B8" font-size="9">Employee Access</text>

    <line x1="460" y1="42" x2="490" y2="42" stroke="#FBBF24" stroke-width="1" opacity="0.5"/>
    <text x="498" y="46" fill="#94A3B8" font-size="9">Manager Access</text>

    <line x1="610" y1="42" x2="640" y2="42" stroke="#34D399" stroke-width="1" opacity="0.5"/>
    <text x="648" y="46" fill="#94A3B8" font-size="9">Automated Process</text>
  </g>

  <!-- ==================== FOOTER ==================== -->
  <text x="550" y="540" text-anchor="middle" fill="#94A3B8" font-size="9" opacity="0.6">ProjectPulse v1.0 — Use Case Diagram — Generated 2026-03-19</text>

</svg>