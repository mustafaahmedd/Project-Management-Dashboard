    <rect x="790" y="248" width="270" height="170" rx="8" fill="#12141A" stroke="#F87171" stroke-width="1.5" opacity="0.95"/>
    <rect x="790" y="248" width="270" height="26" rx="8" fill="#F87171" opacity="0.12"/>
    <text x="925" y="266" text-anchor="middle" fill="#F87171" font-size="11" font-weight="700">ACCOUNT &amp; SETTINGS</text>
    <g font-size="10" fill="#F1F5F9">
      <ellipse cx="862" cy="292" rx="52" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="862" y="296" text-anchor="middle">Register / Login</text>
      <ellipse cx="995" cy="292" rx="46" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="995" y="296" text-anchor="middle">Edit Profile</text>
      <ellipse cx="862" cy="326" rx="50" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="862" y="330" text-anchor="middle">Notifications</text>
      <ellipse cx="995" cy="326" rx="48" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="995" y="330" text-anchor="middle">Integrations</text>
