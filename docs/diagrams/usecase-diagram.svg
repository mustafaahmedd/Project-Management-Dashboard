    <rect x="790" y="72" width="270" height="155" rx="8" fill="#12141A" stroke="#C084FC" stroke-width="1.5" opacity="0.95"/>
    <rect x="790" y="72" width="270" height="26" rx="8" fill="#C084FC" opacity="0.12"/>
