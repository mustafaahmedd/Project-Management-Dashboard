<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" width="1100" height="750" font-family="sans-serif">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0D11"/>
      <stop offset="100%" stop-color="#0E1016"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#F1F5F9" font-size="20" font-weight="700" letter-spacing="0.5">ProjectPulse — Use Case Diagram</text>
  <text x="550" y="56" text-anchor="middle" fill="#94A3B8" font-size="11">Project Management Dashboard</text>

  <!-- ==================== ACTORS (Left Side) ==================== -->

  <!-- Employee Actor -->
  <g transform="translate(72, 200)">
    <circle cx="0" cy="0" r="32" fill="#12141A" stroke="#6C63FF" stroke-width="2"/>
    <!-- Person icon -->
    <circle cx="0" cy="-8" r="8" fill="none" stroke="#6C63FF" stroke-width="1.8"/>
    <path d="M-12,14 Q-12,4 0,2 Q12,4 12,14" fill="none" stroke="#6C63FF" stroke-width="1.8"/>
    <text x="0" y="50" text-anchor="middle" fill="#6C63FF" font-size="12" font-weight="700">Employee</text>
    <text x="0" y="63" text-anchor="middle" fill="#94A3B8" font-size="9">Primary User</text>
  </g>

  <!-- Manager Actor -->
  <g transform="translate(72, 400)">
    <circle cx="0" cy="0" r="32" fill="#12141A" stroke="#FBBF24" stroke-width="2"/>
    <!-- Person with star icon -->
    <circle cx="0" cy="-8" r="8" fill="none" stroke="#FBBF24" stroke-width="1.8"/>
    <path d="M-12,14 Q-12,4 0,2 Q12,4 12,14" fill="none" stroke="#FBBF24" stroke-width="1.8"/>
    <polygon points="0,-18 2,-14 6,-14 3,-11 4,-7 0,-9 -4,-7 -3,-11 -6,-14 -2,-14" fill="#FBBF24" opacity="0.6" transform="translate(14,-6) scale(0.6)"/>
    <text x="0" y="50" text-anchor="middle" fill="#FBBF24" font-size="12" font-weight="700">Manager</text>
    <text x="0" y="63" text-anchor="middle" fill="#94A3B8" font-size="9">Extended Role</text>
  </g>

  <!-- System Actor -->
  <g transform="translate(72, 590)">
    <circle cx="0" cy="0" r="32" fill="#12141A" stroke="#34D399" stroke-width="2"/>
    <!-- Gear icon -->
    <circle cx="0" cy="0" r="7" fill="none" stroke="#34D399" stroke-width="1.8"/>
    <g stroke="#34D399" stroke-width="2.2" stroke-linecap="round">
      <line x1="0" y1="-13" x2="0" y2="-10"/>
      <line x1="0" y1="10" x2="0" y2="13"/>
      <line x1="-13" y1="0" x2="-10" y2="0"/>
      <line x1="10" y1="0" x2="13" y2="0"/>
      <line x1="-9" y1="-9" x2="-7" y2="-7"/>
      <line x1="7" y1="7" x2="9" y2="9"/>
      <line x1="9" y1="-9" x2="7" y2="-7"/>
      <line x1="-7" y1="7" x2="-9" y2="9"/>
    </g>
    <text x="0" y="50" text-anchor="middle" fill="#34D399" font-size="12" font-weight="700">System</text>
    <text x="0" y="63" text-anchor="middle" fill="#94A3B8" font-size="9">Automated</text>
  </g>

  <!-- ==================== USE CASE GROUPS (Right Side) ==================== -->

  <!-- GROUP 1: Project Management -->
  <g>
    <rect x="190" y="72" width="270" height="170" rx="8" fill="#12141A" stroke="#6C63FF" stroke-width="1.5" opacity="0.95"/>
    <rect x="190" y="72" width="270" height="26" rx="8" fill="#6C63FF" opacity="0.12"/>
    <text x="325" y="90" text-anchor="middle" fill="#6C63FF" font-size="11" font-weight="700">PROJECT MANAGEMENT</text>
    <g font-size="10" fill="#F1F5F9">
      <ellipse cx="262" cy="116" rx="58" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="262" y="120" text-anchor="middle">Create Project</text>
      <ellipse cx="395" cy="116" rx="52" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="395" y="120" text-anchor="middle">View Dashboard</text>
      <ellipse cx="262" cy="150" rx="52" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="262" y="154" text-anchor="middle">Update Status</text>
      <ellipse cx="395" cy="150" rx="50" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="395" y="154" text-anchor="middle">Set Deadline</text>
      <ellipse cx="262" cy="184" rx="56" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="262" y="188" text-anchor="middle">Assign Members</text>
      <ellipse cx="395" cy="184" rx="55" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="395" y="188" text-anchor="middle">Archive / Delete</text>
    </g>
    <!-- Row labels for actor mapping -->
    <circle cx="206" cy="116" r="3" fill="#6C63FF" opacity="0.5"/>
    <circle cx="206" cy="150" r="3" fill="#6C63FF" opacity="0.5"/>
    <circle cx="206" cy="184" r="3" fill="#FBBF24" opacity="0.5"/>
  </g>

  <!-- GROUP 2: Task Management -->
  <g>
    <rect x="190" y="254" width="270" height="170" rx="8" fill="#12141A" stroke="#34D399" stroke-width="1.5" opacity="0.95"/>
    <rect x="190" y="254" width="270" height="26" rx="8" fill="#34D399" opacity="0.12"/>
    <text x="325" y="272" text-anchor="middle" fill="#34D399" font-size="11" font-weight="700">TASK MANAGEMENT</text>
    <g font-size="10" fill="#F1F5F9">
      <ellipse cx="262" cy="298" rx="48" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="262" y="302" text-anchor="middle">Create Task</text>
      <ellipse cx="395" cy="298" rx="46" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="395" y="302" text-anchor="middle">Assign Task</text>
      <ellipse cx="262" cy="332" rx="52" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="262" y="336" text-anchor="middle">Move Kanban</text>
      <ellipse cx="395" cy="332" rx="46" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="395" y="336" text-anchor="middle">Set Priority</text>
      <ellipse cx="262" cy="366" rx="50" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="262" y="370" text-anchor="middle">Add Subtasks</text>
      <ellipse cx="395" cy="366" rx="50" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="395" y="370" text-anchor="middle">Filter / Search</text>
    </g>
  </g>

  <!-- GROUP 3: Time Tracking -->
  <g>
    <rect x="490" y="72" width="270" height="140" rx="8" fill="#12141A" stroke="#60A5FA" stroke-width="1.5" opacity="0.95"/>
    <rect x="490" y="72" width="270" height="26" rx="8" fill="#60A5FA" opacity="0.12"/>
    <text x="625" y="90" text-anchor="middle" fill="#60A5FA" font-size="11" font-weight="700">TIME TRACKING</text>
    <g font-size="10" fill="#F1F5F9">
      <ellipse cx="562" cy="116" rx="55" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="562" y="120" text-anchor="middle">Start / Stop Timer</text>
      <ellipse cx="695" cy="116" rx="55" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="695" y="120" text-anchor="middle">Log Manual Entry</text>
      <ellipse cx="562" cy="150" rx="50" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="562" y="154" text-anchor="middle">View Reports</text>
      <ellipse cx="695" cy="150" rx="58" ry="13" fill="#181B22" stroke="#2A2D35" stroke-width="1"/>
      <text x="695" y="154" text-anchor="middle">Estimate Duration</text>
    </g>
